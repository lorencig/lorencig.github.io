<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Lorenci Gjurgjaj</title>
    <meta name="description" content="Page not found - redirecting to main site">
    <script>
        // GitHub Pages 404 handling
        // This script redirects users to the main app when they hit a 404
        const path = window.location.pathname;
        const hash = window.location.hash;
        const search = window.location.search;
        
        // If this is a direct route access (not a hash route), redirect to the main app
        if (!hash && path !== '/') {
            // Redirect to the main app with the path as a hash
            const redirectPath = path + search;
            window.location.href = '/' + '#' + redirectPath;
        } else {
            // If it's already a hash route or root, just go to the main app
            window.location.href = '/';
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>Taking you to the right place...</p>
    </div>
</body>
</html>
